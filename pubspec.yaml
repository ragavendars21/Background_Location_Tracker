name: background_location_tracker
description: A Flutter application that tracks GPS location in the background and displays battery status via Platform Channels.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Location tracking
  geolocator: ^13.0.1

  # Background execution (creates Android Foreground Service + iOS Background Task)
  flutter_background_service: ^5.0.5

  # Local storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # State management
  flutter_riverpod: ^2.6.1

  # Permissions
  permission_handler: ^11.3.1

  # Maps
  google_maps_flutter: ^2.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

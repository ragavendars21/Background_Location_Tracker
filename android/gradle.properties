# Sized for a 16 GB machine that also runs an emulator + Android Studio + VS
# Code at the same time. -Xmx8G/-XX:MaxMetaspaceSize=4G previously reserved
# ~12.5 GB for Gradle alone, leaving the OS with under 1 GB free — the JVM's
# C2 compiler thread then failed a 1.1 MB native malloc and crashed the daemon
# (see android/hs_err_pid*.log: "Out of Memory Error (arena.cpp:168)").
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=false
org.gradle.workers.max=2
android.useAndroidX=true
# Jetifier rewrites legacy Support Library dependencies to AndroidX
android.enableJetifier=true
# Kotlin incremental compilation fails when source files (C:\Pub\Cache) and build
# output (D:\build) are on different drives — relative path computation is impossible.
kotlin.incremental=false
